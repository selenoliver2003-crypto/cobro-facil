<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Cobro Fácil</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #1b5e20; margin-bottom: 20px; }
        h3 { color: #333; margin-top: 5px; border-bottom: 2px solid #1b5e20; padding-bottom: 5px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-top: 15px; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
        input { width: 100%; padding: 12px; margin-top: 8px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { padding: 14px; border: none; border-radius: 12px; color: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-guardar { background: #1b5e20; width: 100%; }
        .btn-cobrar { background: #25D366; padding: 10px 18px; border-radius: 8px; font-size: 15px; font-weight: bold; margin-left: 10px; }
        .btn-eliminar { background: #c62828; padding: 10px 14px; font-size: 15px; border-radius: 8px; margin-left: 5px; }
        ul { list-style: none; padding: 0; }
        li { background: #eee; padding: 12px; margin-top: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        .info-cliente { flex-grow: 1; }
        .botones { display: flex; }
        #buscador { background: #e8f5e9; border: 2px solid #2e7d32; font-weight: bold; }
    </style>
</head>
<body>

    <h1>💰 Cobro Fácil</h1>

    <!-- FORMULARIO PARA AGREGAR -->
    <div class="card">
        <h3>👥 Agregar Cliente</h3>
        <input id="nuevo-nombre" placeholder="Nombre del cliente">
        <input id="nuevo-telefono" type="number" placeholder="Número (ej: 59176616889)">
        <button class="btn-guardar" onclick="guardarCliente()">+ Agregar a la Agenda</button>
    </div>

    <!-- BUSCADOR Y LISTA -->
    <div class="card">
        <h3>📋 Buscar y Cobrar</h3>
        <input id="buscador" type="text" placeholder="🔍 Escribe para buscar cliente..." oninput="actualizarVistas()">
        <ul id="lista-clientes"></ul>
    </div>

    <script>
        let clientes = JSON.parse(localStorage.getItem('agenda_cobros')) || [];

        function actualizarVistas() {
            let lista = document.getElementById("lista-clientes");
            let filtro = document.getElementById("buscador").value.toLowerCase();
            lista.innerHTML = '';
            
            // Filtrar clientes
            let clientesFiltrados = clientes.filter(c => c.nombre.toLowerCase().includes(filtro));
            clientesFiltrados.sort((a, b) => a.nombre.localeCompare(b.nombre));

            if (clientesFiltrados.length === 0) {
                lista.innerHTML = '<li style="background:none; color:#777; justify-content:center;">No se encontraron clientes.</li>';
                return;
            }

            clientesFiltrados.forEach((c, index) => {
                // Encontrar el índice original para borrar correctamente
                let originalIndex = clientes.indexOf(c);
                let li = document.createElement("li");
                li.innerHTML = `
                    <div class="info-cliente">
                        <b>${c.nombre}</b> <span style="color:#555; font-size:14px;">(${c.telefono})</span>
                    </div>
                    <div class="botones">
                        <button class="btn-cobrar" onclick="abrirChat('${c.telefono}')">Cobrar</button>
                        <button class="btn-eliminar" onclick="eliminarCliente(${originalIndex})">X</button>
                    </div>
                `;
                lista.appendChild(li);
            });
        }

        function guardarCliente() {
            let nombre = document.getElementById("nuevo-nombre").value.trim();
            let telefono = document.getElementById("nuevo-telefono").value.trim();
            if(nombre === "" || telefono === "") { alert("Llena nombre y número."); return; }
            
            clientes.push({ nombre: nombre, telefono: telefono });
            localStorage.setItem('agenda_cobros', JSON.stringify(clientes));
            document.getElementById("nuevo-nombre").value = "";
            document.getElementById("nuevo-telefono").value = "";
            actualizarVistas();
        }

        function eliminarCliente(index) {
            if(confirm("¿Eliminar a este cliente?")) {
                clientes.splice(index, 1);
                localStorage.setItem('agenda_cobros', JSON.stringify(clientes));
                actualizarVistas();
            }
        }

        function abrirChat(telefono) {
            window.open("https://wa.me/" + telefono, '_blank');
        }

        actualizarVistas();
    </script>
</body>
</html>
